version: "3.9"
services:
  mysql:
    image: mysql:8.4
    container_name: jmm-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: jechangemamutuelle
    ports:
      - "3306:3306"
    volumes:
      - jmm_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  jmm_mysql_data:
